services:
  - type: web
    name: linkedin-engagement-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: API_SECRET_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/lea.db
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: chrome-extension://*,https://www.linkedin.com
      - key: RENDER
        value: "true"
    disk:
      name: lea-data
      mountPath: /data
      sizeGB: 1
